<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card{
            width: 610px;
            height: 500px;
            background-color: rgba(2, 248, 105, 0.397);
            margin: auto;
            border-radius: 10px;
            padding: 10px;
            margin-top: 30px;   
        }
        .card > h3{
            color: white;
            background-color: green;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 10px;
            margin: -10px -10px 0px -10px;
            border-radius: 10px 10px 0px 0px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h3>Aprender mais</h3>
    </div>
</body>
</html>
