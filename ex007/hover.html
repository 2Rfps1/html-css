<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de hover</title>
    <style>
        .texthover:hover{
            background-color: aqua;
            opacity: 1;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Hover</h1>
    <p class="texthover">Passe o mouse sobre o texto abaixo</p>
</body>
</html>
